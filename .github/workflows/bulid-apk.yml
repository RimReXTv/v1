name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_VERSION: "9.3.1"
      ANDROID_PLATFORM: "android-36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Create local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Create .env
        shell: bash
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then
            printf "GEMINI_API_KEY=%s\n" "${GEMINI_API_KEY}" > .env
          else
            printf "GEMINI_API_KEY=DUMMY_KEY_FOR_CI\n" > .env
          fi

      - name: Create debug keystore
        shell: bash
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Download Gradle
        shell: bash
        run: |
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build Debug APK
        shell: bash
        run: |
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aet-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
